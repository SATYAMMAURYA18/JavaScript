<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card">
        <div class="search">
            <input type="text" id="input" placeholder="Enter city name" spellcheck="false">
            <button>Search</button>
        </div>

        <div class="weather">
            <img id="myImage" src="https://cdn-icons-png.flaticon.com/512/4814/4814268.png" class="weather-icon" alt="Cloudy">
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            
            <div class="details">
                <div class="col">
                    <p class="humidity">45%</p>
                    <p>Humidity</p>
                </div>
                <div class="col">
                    <p class="wind">12 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
<script src="./app.js"></script>
</body>
</html>
